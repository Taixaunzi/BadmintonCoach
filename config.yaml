app:
  host: "0.0.0.0"
  port: 8000
  upload_dir: "./uploads"
  output_dir: "./output"

pose:
  mode: "balanced"
  backend: "onnxruntime"      # onnxruntime / tensorrt / openvino
  device: "cpu"               # cpu / cuda / mps
  det_frequency: 10
  kpt_threshold: 0.43

ball:
  model_path: "./models/tracknet_best.pth"
  confidence_threshold: 0.3
  device: "auto"              # auto / cpu / cuda / mps（auto=有GPU用GPU）

events:
  sport: "badminton"
  angle_ranges:
    # 羽毛球运动中的关节角度范围（比静态站立宽很多）
    # 肘：击球时可弯到20°，完全伸展时175°
    left_elbow: [15, 175]
    right_elbow: [15, 175]
    # 膝：深蹲可到50°，站立时175°
    left_knee: [50, 175]
    right_knee: [50, 175]
    # 肩：击球时角度变化极大，只标记极端情况
    left_shoulder: [0, 140]
    right_shoulder: [0, 140]
  highlight_thresholds:
    wrist_speed_max: 1500      # 高速挥拍阈值（像素/帧）
    body_lean_max: 55          # 极限倾斜阈值（提高，35-50°在羽毛球中常见）
    speed_change_rate: 500

slowmo:
  factor: 0.25
  pre_event_frames: 30
  post_event_frames: 30

llm:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4.1-mini"
  temperature: 0.3
  max_tokens: 500
