services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: badmintoncoach-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./models:/app/models
      - ./config.yaml:/app/config.yaml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: badmintoncoach-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
